<style>

body {

.tag {

}
.msg {

  color: #c8d0dc;
  margin-bottom: 32px;
}
.contact {
  background: #1c2230;
  border-radius: 12px;
  padding: 20px;
  text-align: left;
  font-size: 14px;
  color: #c8d0dc;
}
.contact-label {
  color: #8b96a8;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.contact-row { margin: 6px 0; }
.contact a { color: #ff9072; text-decoration: none; }
.contact a:hover { text-decoration: underline; }
.brand {
  margin-top: 28px;
  font-size: 11px;
  color: #8b96a8;
  letter-spacing: 0.1em;
}

</head>
